<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feeding Arizona — Demographic and Food Insecurity Profiles of Food Bank Service Areas</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700;9..144,800&family=Source+Sans+3:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--maroon:#8C1D40;--gold:#FFC627;--green:#6B8C42;--blue:#4A90A8;--orange:#D4793A;--beet:#A03040;--bg:#12100D;--bg2:#1A1714;--bg3:#22201B;--bg4:#2B2822;--border:#3A3428;--border2:#4A4438;--text:#CBBFA8;--text2:#968B78;--text3:#6B6355;--white:#FFFFFF}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.015;background-image:url("data:image/svg+xml,%3Csvg width='600' height='600' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.03' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.glow-orb{position:fixed;border-radius:50%;filter:blur(140px);pointer-events:none;opacity:0.04;z-index:0}
.glow-1{width:500px;height:500px;background:var(--orange);top:-150px;right:-80px}
.glow-2{width:350px;height:350px;background:var(--green);bottom:-80px;left:-60px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.header{position:sticky;top:0;z-index:100;background:rgba(18,16,13,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px}
.header-inner{max-width:1340px;margin:0 auto;padding:16px 0 0}
.header-top{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:16px}
.brand{display:flex;align-items:center;gap:14px}
.brand h1{font-family:'Fraunces',Georgia,serif;font-size:19px;font-weight:700;color:var(--white);letter-spacing:-0.3px;line-height:1.15;text-align:center}
.brand .sub{font-size:12px;color:var(--text2);margin-top:1px;text-align:center}
.badge{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 10px;border-radius:5px;background:rgba(140,29,64,0.12);color:var(--maroon);border:1px solid rgba(140,29,64,0.25);text-decoration:none;transition:background 0.2s}
.badge:hover{background:rgba(140,29,64,0.2)}
.tabs{display:flex;gap:4px;margin-top:12px;overflow-x:auto;justify-content:center}
.tab-btn{padding:10px 20px;background:transparent;border:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:color 0.2s;white-space:nowrap;border-radius:8px 8px 0 0}
.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--white);background:var(--bg2)}
.content{position:relative;z-index:1;max-width:1340px;margin:0 auto;padding:28px 32px 64px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.45s ease both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}.d7{animation-delay:.28s}.d8{animation-delay:.32s}
.section{margin-bottom:28px}
.fb-hero{display:flex;align-items:center;gap:18px;margin-bottom:28px}
.fb-hero-accent{width:4px;height:48px;border-radius:2px;flex-shrink:0}
.fb-hero h2{font-family:'Fraunces',Georgia,serif;font-size:30px;font-weight:700;color:var(--white);letter-spacing:-0.4px;line-height:1.1}
.fb-hero .meta{font-size:14px;color:var(--text2);margin-top:4px}.fb-hero .meta strong{color:var(--text);font-weight:600}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px 18px;overflow:hidden;transition:border-color 0.3s,transform 0.2s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:600;margin-bottom:6px;font-family:'Space Mono',monospace}
.kpi-value{font-size:32px;font-weight:700;line-height:1;letter-spacing:-0.5px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:13px;color:var(--text2);margin-top:5px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;overflow:hidden}
.panel-label{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2.5px;color:var(--text3);margin-bottom:14px;font-weight:700}
.panel-heading{font-family:'Fraunces',Georgia,serif;font-size:18px;font-weight:600;color:var(--white)}
.panel-sub{font-size:12px;color:var(--text3);margin-top:2px;margin-bottom:14px}
.eth-bar-track{height:8px;border-radius:99px;overflow:hidden;display:flex;margin-bottom:12px;background:var(--bg)}
.eth-bar-seg{height:100%;transition:width 0.6s cubic-bezier(0.22,1,0.36,1)}
.eth-legend{display:flex;flex-wrap:wrap;gap:14px}
.eth-legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);font-weight:500}
.eth-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--bg3)}
th{padding:12px 14px;font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap}
th:first-child{text-align:left}th:not(:first-child){text-align:right}
td{padding:12px 14px;border-bottom:1px solid rgba(58,52,40,0.4);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:500}
td:first-child{font-weight:700;color:var(--white)}td:not(:first-child){text-align:right;color:var(--text)}
tbody tr:hover{background:rgba(43,40,34,0.5)}
.zone-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:10px}
.metric-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.m-btn{padding:7px 16px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-weight:600;transition:all 0.2s;font-family:inherit}
.m-btn:hover:not(.active){border-color:var(--text3);color:var(--text)}
.m-btn.active{border-color:var(--gold);background:rgba(255,198,39,0.07);color:var(--gold)}
.chart-box{position:relative;width:100%}
.vuln-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.vuln-item-label{display:flex;justify-content:space-between;margin-bottom:7px}
.vuln-item-name{font-size:13px;color:var(--text);font-weight:500}
.vuln-item-val{font-size:14px;font-weight:700;color:var(--white);font-variant-numeric:tabular-nums}
.vuln-track{height:4px;border-radius:99px;background:var(--bg);overflow:hidden}
.vuln-fill{height:100%;border-radius:99px;transition:width 0.8s cubic-bezier(0.22,1,0.36,1)}
.cmp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.cmp-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:22px;overflow:hidden;transition:transform 0.2s}
.cmp-card:hover{transform:translateY(-1px)}
.cmp-card-name{font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:600;margin-bottom:14px}
.cmp-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.cc-label{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:700}
.cc-val{font-size:17px;font-weight:700;color:var(--white);font-variant-numeric:tabular-nums;margin-top:2px}
.dict-section{margin-bottom:32px}
.dict-section h3{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;color:var(--white);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.dict-grid{display:grid;gap:0}
.dict-row{display:grid;grid-template-columns:180px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid rgba(58,52,40,0.3)}
.dict-term{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:0.3px;padding-top:2px}
.dict-def{font-size:14px;color:var(--text);line-height:1.65}
.dict-note{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px 20px;font-size:14px;color:var(--text2);line-height:1.7;margin-top:20px}
.dict-note strong{color:var(--text)}
.dict-prose{font-size:14px;color:var(--text);line-height:1.75;margin-bottom:16px}
.dict-prose strong{color:var(--white);font-weight:600}
.footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);line-height:1.7}
.footer strong{color:var(--text2)}
@media(max-width:768px){.content{padding:20px 16px 48px}.header{padding:0 16px}.fb-hero h2{font-size:24px}.kpi-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.kpi-value{font-size:26px}.dict-row{grid-template-columns:1fr;gap:4px}}
</style>
</head>

function kpi(l,v,sub,accent,d){return '<div class="kpi fade-up d'+d+'"><div class="kpi-label">'+l+'</div><div class="kpi-value" style="color:'+(accent||"var(--white)")+'">'+v+'</div>'+(sub?'<div class="kpi-sub">'+sub+'</div>':'')+'</div>';}

function renderFB(code){const fb=DATA[code],s=fb.summary,c=FBC[code],zc=Object.keys(fb.zones).length;

h+='</div><div class="section panel fade-up"><div class="panel-label">Network Comparison</div>'+mBtns()+'<div class="chart-box" style="height:280px"><canvas id="cmpNet"></canvas></div></div><div class="section panel fade-up"><div class="panel-label">All Counties Ranked</div><div style="font-size:12px;color:var(--text3);margin:-8px 0 16px">Every county across all four networks</div><div class="chart-box" id="cmpAllWrap"><canvas id="cmpAll"></canvas></div></div>';return h;}

function drawCmp(){const m=METRICS.find(x=>x.k===met);const ctx1=document.getElementById("cmpNet");
if(ctx1){charts.cmpNet=new Chart(ctx1,{type:"bar",data:{labels:FB_ORDER.map(c=>DATA[c].name),datasets:[{label:m.l,data:FB_ORDER.map(c=>DATA[c].summary[met]),backgroundColor:FB_ORDER.map(c=>FBC[c]+"B0"),hoverBackgroundColor:FB_ORDER.map(c=>FBC[c]),borderColor:"transparent",borderWidth:0,borderRadius:8,barPercentage:0.55}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:600,easing:"easeOutQuart"},plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(18,16,13,0.95)",titleColor:"#F2EBD9",bodyColor:"#CBBFA8",borderColor:"#3A342840",borderWidth:1,padding:12,cornerRadius:10,displayColors:false}},scales:{x:{grid:{display:false},ticks:{color:"#CBBFA8",font:{size:11,family:"'Source Sans 3'",weight:"600"},maxRotation:0,callback:function(v,i){return["SMFB","UFB","CFBSA","YCFB"][i];}}},y:{grid:{color:"rgba(58,52,40,0.3)",drawBorder:false},ticks:{color:"#6B6355",font:{size:11}}}}}});}
const allZ=[];FB_ORDER.forEach(c=>{Object.entries(DATA[c].zones).forEach(([n,z])=>{allZ.push({name:n+" ("+c+")",fb:c,value:z[met]});});});allZ.sort((a,b)=>b.value-a.value);
const wrap=document.getElementById("cmpAllWrap");if(wrap)wrap.style.height=Math.max(300,allZ.length*30+40)+"px";
const ctx2=document.getElementById("cmpAll");
if(ctx2){charts.cmpAll=new Chart(ctx2,{type:"bar",data:{labels:allZ.map(z=>z.name),datasets:[{label:m.l,data:allZ.map(z=>z.value),backgroundColor:allZ.map(z=>FBC[z.fb]+"B0"),hoverBackgroundColor:allZ.map(z=>FBC[z.fb]),borderColor:"transparent",borderWidth:0,borderRadius:5,barPercentage:0.65}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,animation:{duration:600,easing:"easeOutQuart"},plugins:{legend:{display:false},tooltip:{backgroundColor:"rgba(18,16,13,0.95)",titleColor:"#F2EBD9",bodyColor:"#CBBFA8",borderColor:"#3A342840",borderWidth:1,padding:12,cornerRadius:10,displayColors:false}},scales:{x:{grid:{color:"rgba(58,52,40,0.3)",drawBorder:false},ticks:{color:"#6B6355",font:{size:11}}},y:{grid:{display:false},ticks:{color:"#CBBFA8",font:{size:11,weight:"500"},padding:6}}}}});}}

function renderDict(){return '<div class="fb-hero fade-up"><div class="fb-hero-accent" style="background:var(--gold)"></div><div><h2>Data Dictionary &amp; Methodology</h2><div class="meta">Variable definitions, data sources, and aggregation methods</div></div></div>'+
'<div class="dict-section fade-up"><h3>Data Sources</h3>'+
'<div class="dict-prose"><strong>Demographic and SNAP data</strong> were obtained from the U.S. Census Bureau\u2019s American Community Survey (ACS) 5-Year Estimates (2019\u20132023) at the census tract level. The ACS is a nationwide survey conducted by the U.S. Census Bureau that collects detailed information on social, economic, housing, and demographic characteristics of communities on a continuous basis, rather than only during the decennial census. The 5-year estimates pool data collected over a five-year period, providing more reliable estimates for small geographies like census tracts.</div>'+
'<div class="dict-prose"><strong>Food insecurity estimates</strong> (2023) were sourced from Feeding America\u2019s Map the Meal Gap project, which produces annual census tract-level estimates of food insecurity using the U.S. Census Bureau\u2019s Current Population Survey along with local indicators such as poverty rates, unemployment, and median income. Food insecurity refers to the lack of consistent access to enough food for every person in a household to live an active, healthy life.</div>'+
'<div class="dict-prose"><strong>Grocery store and WIC/SNAP retailer location data</strong> were sourced from the Arizona Department of Health Services (ADHS). These data were compiled and integrated into the ASU Food Insecurity Dashboard, a web-based mapping platform built using Esri ArcGIS Online (last updated February 2026).</div>'+
'<div class="dict-note"><strong>About census tracts:</strong> Census tracts are a standard geographic unit defined by the U.S. Census Bureau. They were selected for this analysis because they provide a finer level of spatial detail than other common geographies such as zip codes or cities. The average census tract in Arizona has a population of just over 4,000 people. Tracts with zero population or zero households (e.g., those covering college campuses, airports, or military installations) have been excluded from all calculations in this dashboard.</div></div>'+

'<div class="dict-section fade-up"><h3>Service Area Assignment</h3>'+
'<div class="dict-prose">Each census tract is assigned to one of four food bank service areas. Where a tract\u2019s geography overlapped with two service areas, it was assigned to the food bank covering the greater surface area of the tract. The four service areas are:</div>'+
'<div class="dict-grid">'+
'<div class="dict-row"><div class="dict-term">SMFB</div><div class="dict-def"><strong>St. Mary\u2019s Food Bank.</strong> Maricopa, Yavapai, Mohave, Coconino, Pinal, Navajo, Apache, and Gila counties.</div></div>'+
'<div class="dict-row"><div class="dict-term">UFB</div><div class="dict-def"><strong>United Food Bank.</strong> Parts of Maricopa, Pinal, Navajo, Gila, and Apache counties (primarily East Valley and eastern Arizona).</div></div>'+
'<div class="dict-row"><div class="dict-term">CFBSA</div><div class="dict-def"><strong>Community Food Bank of Southern Arizona.</strong> Pima, Cochise, Graham, Greenlee, and Santa Cruz counties.</div></div>'+
'<div class="dict-row"><div class="dict-term">YCFB</div><div class="dict-def"><strong>Yuma Community Food Bank.</strong> Yuma and La Paz counties.</div></div>'+
'</div></div>'+

'<div class="dict-section fade-up"><h3>Aggregation Methodology</h3>'+
'<div class="dict-prose">This dashboard aggregates tract-level data up to the county level within each food bank\u2019s service area. Two weighting methods are used depending on whether the variable describes individuals or households:</div>'+
'<div class="dict-grid">'+
'<div class="dict-row"><div class="dict-term">Population-weighted averages</div><div class="dict-def">Used for person-level rates: food insecurity rate, unemployment rate, percent seniors, percent uninsured, educational attainment, and all race/ethnicity shares. Each tract\u2019s rate is weighted by its total population so that larger tracts contribute proportionally more to the aggregate.</div></div>'+
'<div class="dict-row"><div class="dict-term">Household-weighted averages</div><div class="dict-def">Used for household-level rates: SNAP participation rate, renter-occupied percentage, no-vehicle percentage, female-headed household percentage, and households with children percentage. Each tract\u2019s rate is weighted by its total household count.</div></div>'+
'<div class="dict-row"><div class="dict-term">Sums</div><div class="dict-def">Used for count variables: total population, total households, food insecure individuals, SNAP households, and senior count. These are summed across all tracts in a given area.</div></div>'+
'</div></div>'+

'<div class="dict-section fade-up"><h3>Variable Definitions</h3><div class="dict-grid">'+
'<div class="dict-row"><div class="dict-term">Population</div><div class="dict-def">Total population count within the geographic area. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Households (HH)</div><div class="dict-def">Total number of occupied housing units. A household includes all persons who occupy a housing unit as their usual place of residence, regardless of relationship. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Food Insecurity Rate (FI Rate)</div><div class="dict-def">Estimated percentage of the population lacking consistent access to enough food for every person in the household to live an active, healthy life. This is a modeled estimate, not a direct survey measure at the tract level. Source: Feeding America, Map the Meal Gap (2023).</div></div>'+
'<div class="dict-row"><div class="dict-term">Food Insecure (count)</div><div class="dict-def">Estimated number of food-insecure individuals. Derived from the food insecurity rate applied to tract population.</div></div>'+
'<div class="dict-row"><div class="dict-term">SNAP Rate</div><div class="dict-def">Percentage of households receiving Supplemental Nutrition Assistance Program (SNAP) benefits. SNAP is a federal nutrition assistance program administered by the USDA, formerly known as food stamps. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">SNAP Households</div><div class="dict-def">Count of households receiving SNAP benefits. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Median Household Income</div><div class="dict-def">The income level at which half of households earn more and half earn less, reported in current dollars. Aggregated as a population-weighted average of tract-level medians. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Unemployment Rate</div><div class="dict-def">Percentage of the civilian labor force (persons aged 16+ who are working or actively seeking work) that is unemployed. This is the ACS civilian unemployment rate and may differ from Bureau of Labor Statistics (BLS) figures. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Renter-Occupied HH (%)</div><div class="dict-def">Percentage of occupied housing units where the householder pays rent rather than owning. Higher renter rates can indicate housing instability and greater vulnerability to displacement. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">No Vehicle HH (%)</div><div class="dict-def">Percentage of households with no vehicle available. A key indicator of food access barriers, as households without vehicles may struggle to reach grocery stores and food distribution sites. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Uninsured (%)</div><div class="dict-def">Percentage of the population without health insurance coverage. Uninsured populations face compounding disadvantages alongside food insecurity, including reduced access to preventive care and nutrition-related health services. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Female-Headed HH (%)</div><div class="dict-def">Percentage of households headed by a female householder with no spouse present. Single-mother households experience food insecurity at significantly higher rates than other household types. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Bachelor\u2019s Degree+ (%)</div><div class="dict-def">Percentage of the population aged 25 and older holding a bachelor\u2019s degree or higher. Educational attainment is a strong structural correlate of income and food security. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Seniors / 65+ (%)</div><div class="dict-def">Individuals aged 65 years and older as a share of total population. Older adults face elevated food insecurity risk due to fixed incomes, mobility limitations, and health-related dietary needs. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">HH with Children (%)</div><div class="dict-def">Percentage of households with one or more members under 18 years of age. Households with children are a priority population for food assistance programs due to the developmental impacts of childhood hunger. Source: ACS 5-Year Estimates.</div></div>'+
'<div class="dict-row"><div class="dict-term">Race / Ethnicity</div><div class="dict-def">Mutually exclusive categories: non-Hispanic White, Hispanic or Latino (of any race), non-Hispanic Black, non-Hispanic American Indian/Alaska Native, and non-Hispanic Asian. May not sum to 100% because \u201CTwo or more races\u201D and other small categories are not displayed. Source: ACS 5-Year Estimates.</div></div>'+
'</div></div>'+
'<div class="dict-section fade-up"><h3>Disclaimer</h3>'+
'<div class="dict-note">This dashboard presents aggregated estimates derived from publicly available data sources for informational and planning purposes only. Estimates are subject to sampling error and modeling uncertainty inherent in the underlying data. The data should not be used to make determinations about specific individuals, households, or addresses. Arizona State University, the T. Denny Sanford School of Social and Family Dynamics, and the Data Devils program make no warranties regarding the accuracy or completeness of the information presented and assume no liability for decisions made on the basis of this dashboard.</div></div>'+
'<div class="dict-section fade-up"><h3>Team &amp; Contact</h3>'+
'<div class="dict-prose">This dashboard was developed by <strong>Connor Sheehan</strong>, <strong>Aaron Flores</strong>, <strong>Alexi Vogel</strong>, and <strong>Christina Ngo</strong> at Arizona State University. Built with assistance from Claude (Anthropic).</div>'+
'<div class="dict-prose">We are continuously working to improve access to community data across Arizona. If you have questions, feedback, or would like to discuss a potential collaboration, please reach out:</div>'+
'<div style="margin-top:8px"><a href="mailto:connor.m.sheehan@asu.edu" style="color:var(--gold);font-weight:600;text-decoration:none;font-size:15px;border-bottom:1px solid rgba(255,198,39,0.3)">connor.m.sheehan@asu.edu</a><br><a href="mailto:aaron.b.flores@asu.edu" style="color:var(--gold);font-weight:600;text-decoration:none;font-size:15px;border-bottom:1px solid rgba(255,198,39,0.3)">aaron.b.flores@asu.edu</a></div>'+
'</div>';}

const FOOTER='<div class="footer">Sources: U.S. Census Bureau, American Community Survey 5-Year Estimates (2019\u20132023); Feeding America, Map the Meal Gap (2023); Arizona Department of Health Services.<br>Dashboard by <a href="https://thesanfordschool.asu.edu/data-devils" target="_blank" rel="noopener" style="color:var(--gold);font-weight:700;text-decoration:none;border-bottom:1px solid rgba(255,198,39,0.3)">Data Devils</a>, Arizona State University.</div>';

function render(){dc();buildTabs();const el=document.getElementById("content");if(tab==="DICT"){el.innerHTML=renderDict()+FOOTER;}else if(tab==="COMPARE"){el.innerHTML=renderCmp()+FOOTER;drawCmp();}else{el.innerHTML=renderFB(tab)+FOOTER;drawFB(tab);}document.querySelectorAll(".m-btn").forEach(b=>{b.addEventListener("click",function(){met=this.dataset.m;render();});});}

Chart.defaults.color="#6B6355";Chart.defaults.font.family="'Source Sans 3',system-ui,sans-serif";
render();
</script></body></html>
